name: "btv_anmeldung"

services:
  rails-app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ..:/workspaces/btv_anmeldung:cached

    # Hält den Container am Leben, damit VS Code sich verbinden kann
    command: sleep infinity

    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - default
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

volumes:
  postgres-data: