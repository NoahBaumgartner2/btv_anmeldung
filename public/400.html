<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ungültige Anfrage – 400</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f5;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
    .code {
      font-size: 72px;
      font-weight: 900;
      color: #6b7280;
      line-height: 1;
      margin-bottom: 12px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 10px; }
    p  { font-size: 15px; color: #6b7280; line-height: 1.6; margin-bottom: 32px; }
    a  {
      display: inline-block;
      background: #dc2626;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 10px;
    }
    a:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Fehler 400</div>
    <div class="code">400</div>
    <h1>Ungültige Anfrage</h1>
    <p>Die Anfrage konnte nicht verarbeitet werden.<br>
       Bitte überprüfe die eingegebenen Daten und versuche es erneut.</p>
    <a href="/">Zurück zur Startseite</a>
  </div>
</body>
</html>
