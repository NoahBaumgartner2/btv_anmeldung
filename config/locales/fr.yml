      r9_basis: "Consentement (art. 6, al. 1, lit. a RGPD) – révocable à tout moment"
      s3: "3. Données particulièrement sensibles"
      ahv_title: "Numéro AVS (AHVN13)"
      ahv_body: "Le numéro AVS constitue une donnée particulièrement sensible selon la loi fédérale sur la protection des données révisée (LPD art. 5 lit. c). Il est utilisé exclusivement pour la déclaration J+S obligatoire légalement à l'OFSPO, stocké de manière chiffrée et non transmis à des tiers — sauf à l'autorité fédérale compétente dans le cadre de l'obligation de déclaration."
      minors_title: "Données des mineurs"
      minors_body: "Nos cours s'adressent principalement aux enfants et aux jeunes. Conformément à l'art. 8 RGPD et à la LPD révisée, les données des mineurs de moins de 16 ans ne sont traitées qu'avec le consentement d'un représentant légal. Le compte est créé par le représentant légal (parent). Nous ne collectons pas de données allant au-delà de ce qui est nécessaire au fonctionnement des cours."
      s4: "4. Prestataires tiers et transferts de données"
      payment_title: "%{provider} (traitement des paiements)"
      payment_body: "Pour les frais de cours, nous utilisons %{provider} comme prestataire de paiement. Les données de paiement sont transmises directement au prestataire et ne sont pas stockées sur nos serveurs. En cas de transfert aux États-Unis, les clauses contractuelles types (CCT) de la Commission européenne s'appliquent conformément à l'art. 46, al. 2, lit. c RGPD."
      smtp_title: "%{provider} (envoi d'e-mails)"
      smtp_body: "Pour l'envoi des e-mails de confirmation et des messages système, nous utilisons %{provider}. Le prestataire traite les adresses e-mail exclusivement aux fins de livraison."
      hosting_title: "Hébergement / Serveur"
      hosting_body_with: "L'application est hébergée chez %{provider} (%{country}). Aucun transfert vers des pays tiers sans niveau de protection adéquat n'a lieu."
      hosting_body_without: "L'application est hébergée chez un prestataire d'hébergement externe. Aucun transfert vers des pays tiers sans niveau de protection adéquat n'a lieu."
      s5: "5. Cookies et stockage local"
      cookies_intro: "Cette plateforme utilise exclusivement des cookies techniquement nécessaires. Ceux-ci sont indispensables au bon fonctionnement et ne nécessitent pas de consentement."
      cookies_note: "Nous n'utilisons pas de cookies de suivi, publicitaires ou analytiques."
      tc_name: "Cookie / Stockage"
      tc_purpose: "Finalité"
      tc_type: "Type"
      tc_session_purpose: "Gestion de session / état de connexion"
      tc_csrf_purpose: "Protection CSRF (sécurité)"
      tc_consent_purpose: "Enregistre votre préférence en matière de cookies"
      tc_necessary: "Techniquement nécessaire"
      s6: "6. Durée de conservation"
      ret1: "Les données du compte sont conservées tant que le compte est actif."
      ret2: "Après la suppression du compte, toutes les données personnelles sont définitivement supprimées dans les 30 jours, dans la mesure où aucune obligation légale de conservation ne s'y oppose."
      ret3: "Les données comptables (paiements) sont conservées pendant 10 ans conformément au droit des obligations suisse (art. 958f CO)."
      ret4: "Les données de rapportage J+S sont conservées conformément aux directives de l'OFSPO."
      ret5: "Les abonnements à la newsletter sont conservés jusqu'à la désinscription."
      s7: "7. Vos droits"
      rights_intro: "Vous disposez des droits suivants en vertu du RGPD et de la LPD révisée :"
      right_access_title: "Accès (art. 15 RGPD)"
      right_access_body: "Vous avez le droit de savoir quelles données nous avons enregistrées vous concernant."
      right_rect_title: "Rectification (art. 16 RGPD)"
      right_rect_body: "Vous pouvez corriger les données inexactes directement dans votre profil ou nous contacter."
      right_erase_title: "Effacement (art. 17 RGPD)"
      right_erase_body_html: "Vous pouvez supprimer votre compte à tout moment : <a href='%{url}' class='text-primary-600 underline'>Supprimer le compte</a>."
      right_port_title: "Portabilité des données (art. 20 RGPD)"
      right_port_body_html: "Télécharger vos données en export : <a href='%{url}' class='text-primary-600 underline'>Exporter les données</a>."
      right_obj_title: "Opposition (art. 21 RGPD)"
      right_obj_body: "Vous pouvez vous opposer au traitement basé sur un intérêt légitime. Veuillez nous contacter directement à cet effet."
      right_revoke_title: "Retrait du consentement"
      right_revoke_body_html: "Révoquer le consentement à la newsletter à tout moment : <a href='%{url}' class='text-primary-600 underline'>Se désabonner</a>."
      s8: "8. Droit de réclamation"
      complaint_intro: "Vous avez le droit de déposer une réclamation auprès de l'autorité de surveillance compétente :"
      edob_name: "Préposé fédéral à la protection des données et à la transparence (PFPDT)"
      edob_address: "Feldeggweg 1, 3003 Berne"
      edob_website: "edoeb.admin.ch"
      edob_note: "Les personnes résidant dans l'UE peuvent également s'adresser à l'autorité nationale de protection des données compétente."
      s9: "9. Modifications de cette déclaration"
      changes_body: "Nous nous réservons le droit d'adapter cette politique de confidentialité si nécessaire. La version actuelle est toujours disponible sur cette page. En cas de modifications importantes, nous en informerons les utilisateurs enregistrés par e-mail."

