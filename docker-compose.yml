services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  web:
    build: .
    # Das Kommando bleibt als Fallback, falls du ohne VS Code startest
    command: bash -c "bundle install && bin/rails db:prepare && rm -f tmp/pids/server.pid && bin/rails s -b '0.0.0.0'"
    volumes:
      - .:/rails:cached
      - bundle_data:/usr/local/bundle # Verhindert den Deadlock-Fehler!
    ports:
      - "3000:3000"
    # Diese beiden Zeilen sind wichtig für Dev Container (halten den Prozess offen)
    tty: true
    stdin_open: true
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/btv_development
      - RAILS_ENV=development
    depends_on:
      - db

volumes:
  postgres_data:
  bundle_data: